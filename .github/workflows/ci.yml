name: CI

on:
  push:
    branches: [master]
    paths: ['backend/**']
  pull_request:
    branches: [master]
    paths: ['backend/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/AiSupportWorkflow.sln
      - run: dotnet build backend/AiSupportWorkflow.sln --no-restore
      - run: dotnet test backend/AiSupportWorkflow.sln --no-build
